<form *ngIf="dynamicForm && schema"
      [formGroup]="dynamicForm">

  <div *ngFor="let field of schema.fields">
    <mat-form-field>
      <mat-label>{{ field.label }}</mat-label>

    <input
  matInput
  [formControlName]="field.name">
    </mat-form-field>
  </div>

  <button type="button" (click)="submit()">
    Submit
  </button>

</form>
