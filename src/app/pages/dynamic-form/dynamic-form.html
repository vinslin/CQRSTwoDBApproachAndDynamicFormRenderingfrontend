<form
 [formGroup]="dynamicForm">

 <div
   *ngFor="let field of schema.fields">

   <mat-form-field>

      <mat-label>

         {{field.label}}

      </mat-label>

      <input
       matInput
       [formControlName]="field.id">

   </mat-form-field>

 </div>

 <button
   (click)="submit()">

   Submit

 </button>

</form>
